<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT AI - 智能PPT生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input[type="text"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        textarea {
            min-height: 150px;
            resize: vertical;
            font-family: 'Consolas', monospace;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #48bb78;
            color: white;
        }
        .btn-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
        }
        .btn-download {
            background: #e67e22;
            color: white;
        }
        .btn-download:hover {
            background: #d35400;
            transform: translateY(-2px);
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 13px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        .checkbox-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-indicator.connected {
            background: #48bb78;
            box-shadow: 0 0 5px #48bb78;
        }
        .status-indicator.disconnected {
            background: #f56565;
            box-shadow: 0 0 5px #f56565;
        }
        .llm-config {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
        .llm-config h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .web-search-section {
            margin: 12px 0;
        }
        .web-search-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: white;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
            cursor: pointer;
        }
        .web-search-toggle.active {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .toggle-switch {
            position: relative;
            width: 52px;
            height: 28px;
            flex-shrink: 0;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 28px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        .toggle-switch input:checked + .toggle-slider {
            background-color: #667eea;
        }
        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }
        .toggle-label {
            font-weight: bold;
            color: #333;
        }
        .toggle-desc {
            font-size: 0.85em;
            color: #666;
            margin-top: 2px;
        }
        .feature-badges {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .feature-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
        }
        .feature-badge.search {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .feature-badge.enrich {
            background: #e3f2fd;
            color: #1565c0;
        }
        .web-search-config {
            background: #f0f4ff;
            border: 2px solid #667eea;
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .config-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #e8edfa;
            cursor: pointer;
            user-select: none;
        }
        .config-header h4 {
            color: #4c6ef5;
            margin: 0;
            font-size: 0.95em;
        }
        .config-header .arrow {
            transition: transform 0.3s;
            color: #4c6ef5;
            font-weight: bold;
        }
        .config-header .arrow.up {
            transform: rotate(180deg);
        }
        .config-body {
            padding: 15px;
            max-height: 500px;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }
        .config-body.collapsed {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
        }
        .provider-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .provider-btn {
            padding: 6px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: bold;
            transition: all 0.2s;
            color: #555;
        }
        .provider-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        .provider-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .provider-btn .free-tag {
            font-size: 0.7em;
            background: #48bb78;
            color: white;
            padding: 1px 6px;
            border-radius: 8px;
            margin-left: 4px;
        }
        .provider-config-form {
            margin-top: 10px;
        }
        .provider-help {
            font-size: 0.8em;
            color: #888;
            margin-top: 4px;
        }
        .provider-help a {
            color: #4c6ef5;
        }
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading.show {
            display: flex;
        }
        .loading p {
            color: white;
            font-size: 1.5em;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .outline-editor {
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }
        .outline-item {
            background: #f7fafc;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .outline-item h4 {
            color: #667eea;
            margin-bottom: 8px;
        }
        .outline-item textarea {
            width: 100%;
            min-height: 80px;
            margin-top: 8px;
        }
        .log-viewer {
            background: #1a1a1a;
            color: #ffffff;
            font-family: 'Consolas', monospace;
            padding: 15px;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
            white-space: pre-wrap;
            font-size: 11px;
        }
        .log-panel {
            position: relative;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .log-header h2 {
            margin: 0;
            font-size: 1.2em;
        }
        .collapse-btn {
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .collapse-btn:hover {
            background: #38a169;
        }
        .log-content {
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .log-content.collapsed {
            max-height: 0;
            padding: 0;
            margin: 0;
        }
        .preview-container {
            margin-top: 20px;
        }
        .preview-iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 10px;
            background: white;
        }
    </style>
</head>
<body>
    <h1>PPT AI - 智能PPT生成器</h1>

    <div class="container">
        <div class="panel">
            <h2>第一步：输入提示词或编写大纲</h2>

            <div class="form-group">
                <label for="topic">PPT主题/需求描述</label>
                <textarea id="topic" placeholder="请输入PPT主题或详细需求，如：人工智能的发展历程和应用场景分析"></textarea>
            </div>

            <div class="form-group">
                <label for="language">语言</label>
                <select id="language">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                </select>
            </div>

            <div class="web-search-section">
                <div class="web-search-toggle" id="webSearchToggle">
                    <label class="toggle-switch" onclick="event.stopPropagation()">
                        <input type="checkbox" id="useWebSearch" onchange="onWebSearchToggle()">
                        <span class="toggle-slider"></span>
                    </label>
                    <div>
                        <div class="toggle-label">🌐 联网搜索增强</div>
                        <div class="toggle-desc">开启后，LLM将联网搜索资料，内容更丰富、更准确</div>
                        <div class="feature-badges">
                            <span class="feature-badge search">🔍 全网搜索</span>
                            <span class="feature-badge enrich">📊 内容增强</span>
                        </div>
                    </div>
                </div>

                <div class="web-search-config" id="webSearchConfig">
                    <div class="config-header" onclick="toggleWebSearchConfig()">
                        <h4>⚙️ 搜索引擎配置</h4>
                        <span class="arrow up" id="configArrow">▼</span>
                    </div>
                    <div class="config-body" id="configBody">
                        <div class="provider-selector" id="providerSelector">
                            <button class="provider-btn active" data-provider="tavily" onclick="selectProvider('tavily')">Tavily</button>
                            <button class="provider-btn" data-provider="serpapi" onclick="selectProvider('serpapi')">SerpAPI</button>
                            <button class="provider-btn" data-provider="bing" onclick="selectProvider('bing')">Bing</button>
                            <button class="provider-btn" data-provider="google" onclick="selectProvider('google')">Google</button>
                            <button class="provider-btn" data-provider="brave" onclick="selectProvider('brave')">Brave</button>
                        </div>

                        <div class="provider-config-form" id="providerConfigForm">
                        </div>

                        <div class="btn-group">
                            <button class="btn btn-primary btn-sm" onclick="configureWebSearch()">保存配置</button>
                            <span id="webSearchStatus">
                                <span class="status-indicator disconnected"></span>
                                <span>联网搜索未配置</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="generateOutline()">生成大纲</button>
                <button class="btn btn-secondary" onclick="useManualOutline()">使用手动大纲</button>
                <button class="btn btn-secondary" onclick="clearForm()">清空</button>
            </div>

            <div class="llm-config">
                <h3>LLM配置</h3>
                <div class="form-group">
                    <label for="apiEndpoint">API端点</label>
                    <input type="text" id="apiEndpoint" placeholder="http://localhost:18080/v1/chat/completions">
                </div>
                <div class="form-group">
                    <label for="apiKey">API密钥</label>
                    <input type="text" id="apiKey" placeholder="（可选）">
                </div>
                <div class="form-group">
                    <label for="modelName">模型名称</label>
                    <input type="text" id="modelName" placeholder="gpt-3.5-turbo 或 qwen3.5:9b">
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="isLocal">
                    <label for="isLocal">本地模型（如WSL2 llama.cpp）</label>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="configureLLM()">保存配置</button>
                    <span id="llmStatus">
                        <span class="status-indicator disconnected"></span>
                        <span>LLM未配置</span>
                    </span>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>第二步：编辑大纲</h2>
            <div id="outlineEditor" style="display: none;">
                <div id="outlineContent"></div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="generateSlides()">生成PPT</button>
                    <button class="btn btn-secondary" onclick="updateOutlineFromEditor()">更新大纲</button>
                </div>
            </div>

            <div class="preview-container" id="previewContainer" style="display: none;">
                <h2>第三步：预览PPT</h2>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="downloadHTML()">下载HTML</button>
                    <button class="btn btn-download" onclick="downloadPPTX()">下载PPTX</button>
                </div>
                <iframe id="pptPreview" class="preview-iframe"></iframe>
            </div>
        </div>

        <div class="panel log-panel" style="grid-column: 1 / -1;">
            <div class="log-header">
                <h2>日志</h2>
                <div>
                    <button class="btn btn-secondary" onclick="refreshLogs()" style="margin-right: 10px;">刷新日志</button>
                    <button class="collapse-btn" onclick="toggleLog()">折叠</button>
                </div>
            </div>
            <div id="logContent" class="log-content">
                <div id="logViewer" class="log-viewer">日志将显示在这里...</div>
            </div>
        </div>
    </div>

    <div class="loading" id="loading">
        <p>处理中，请稍候...</p>
    </div>

    <script>
        let currentOutline = null;
        let llmConfigured = false;
        let webSearchConfigured = false;
        let currentProvider = 'tavily';

        const providerForms = {
            tavily: `
                <div class="form-group">
                    <label>Tavily API密钥</label>
                    <input type="text" id="providerApiKey" placeholder="tvly-xxxxxxxxxxxxxxxxxxxxxxxx">
                </div>
                <div class="provider-help">获取免费API密钥：<a href="https://app.tavily.com" target="_blank">https://app.tavily.com</a>（新账户1000次免费搜索）</div>
            `,
            serpapi: `
                <div class="form-group">
                    <label>SerpAPI API密钥</label>
                    <input type="text" id="providerApiKey" placeholder="your_serpapi_key">
                </div>
                <div class="provider-help">获取API密钥：<a href="https://serpapi.com/manage-api-key" target="_blank">https://serpapi.com</a>（100次/月免费）</div>
            `,
            bing: `
                <div class="form-group">
                    <label>Bing Search API密钥</label>
                    <input type="text" id="providerApiKey" placeholder="your_azure_bing_key">
                </div>
                <div class="provider-help">获取API密钥：<a href="https://www.microsoft.com/en-us/bing/apis/bing-web-search-api" target="_blank">Azure Bing Search</a>（1000次/月免费）</div>
            `,
            google: `
                <div class="form-group">
                    <label>Google API密钥</label>
                    <input type="text" id="providerApiKey" placeholder="your_google_api_key">
                </div>
                <div class="form-group">
                    <label>自定义搜索引擎ID (cx)</label>
                    <input type="text" id="providerCx" placeholder="your_custom_search_engine_id">
                </div>
                <div class="provider-help">获取API密钥：<a href="https://console.cloud.google.com/apis/credentials" target="_blank">Google Cloud Console</a> | 创建搜索引擎：<a href="https://programmablesearchengine.google.com/" target="_blank">Programmable Search Engine</a></div>
            `,
            brave: `
                <div class="form-group">
                    <label>Brave Search API密钥</label>
                    <input type="text" id="providerApiKey" placeholder="your_brave_api_key">
                </div>
                <div class="provider-help">获取免费API密钥：<a href="https://brave.com/search/api/" target="_blank">https://brave.com/search/api</a>（免费2000次/月）</div>
            `
        };

        function selectProvider(provider) {
            currentProvider = provider;
            document.querySelectorAll('.provider-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.provider === provider);
            });
            document.getElementById('providerConfigForm').innerHTML = providerForms[provider] || '';

            const saved = JSON.parse(localStorage.getItem('webSearchConfig') || '{}');
            if (saved.provider === provider) {
                setTimeout(() => {
                    const apiKeyEl = document.getElementById('providerApiKey');
                    if (apiKeyEl && saved.api_key) apiKeyEl.value = saved.api_key;
                    const cxEl = document.getElementById('providerCx');
                    if (cxEl && saved.cx) cxEl.value = saved.cx;
                }, 0);
            }
        }

        function toggleWebSearchConfig() {
            const body = document.getElementById('configBody');
            const arrow = document.getElementById('configArrow');

            if (body.classList.contains('collapsed')) {
                body.classList.remove('collapsed');
                arrow.classList.add('up');
            } else {
                body.classList.add('collapsed');
                arrow.classList.remove('up');
            }
        }

        function onWebSearchToggle() {
            const toggle = document.getElementById('webSearchToggle');
            const checked = document.getElementById('useWebSearch').checked;
            if (checked) {
                toggle.classList.add('active');
                if (!webSearchConfigured) {
                    const body = document.getElementById('configBody');
                    if (body.classList.contains('collapsed')) {
                        toggleWebSearchConfig();
                    }
                    alert('请先配置搜索引擎以启用联网搜索功能');
                    document.getElementById('useWebSearch').checked = false;
                    toggle.classList.remove('active');
                }
            } else {
                toggle.classList.remove('active');
            }
        }

        async function configureLLM() {
            const apiEndpoint = document.getElementById('apiEndpoint').value;
            const apiKey = document.getElementById('apiKey').value;
            const modelName = document.getElementById('modelName').value;
            const isLocal = document.getElementById('isLocal').checked;

            if (!apiEndpoint || !modelName) {
                alert('请填写API端点和模型名称');
                return;
            }

            showLoading('配置LLM中...');

            try {
                const response = await fetch('/api/configure-llm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_endpoint: apiEndpoint, api_key: apiKey, model_name: modelName, is_local: isLocal })
                });

                if (response.ok) {
                    llmConfigured = true;
                    document.getElementById('llmStatus').innerHTML = '<span class="status-indicator connected"></span><span>LLM已配置</span>';
                    localStorage.setItem('llmConfig', JSON.stringify({ api_endpoint: apiEndpoint, api_key: apiKey, model_name: modelName, is_local: isLocal }));
                    alert('LLM配置成功！');
                } else {
                    alert('LLM配置失败');
                }
            } catch (error) {
                alert('配置错误: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        async function configureWebSearch() {
            const payload = { provider: currentProvider };

            if (currentProvider === 'google') {
                const apiKey = document.getElementById('providerApiKey')?.value;
                const cx = document.getElementById('providerCx')?.value;
                if (!apiKey || !cx) {
                    alert('请填写Google API密钥和搜索引擎ID');
                    return;
                }
                payload.api_key = apiKey;
                payload.cx = cx;
            } else {
                const apiKey = document.getElementById('providerApiKey')?.value;
                if (!apiKey) {
                    alert('请填写API密钥');
                    return;
                }
                payload.api_key = apiKey;
            }

            showLoading('配置联网搜索中...');

            try {
                const response = await fetch('/api/configure-web-search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    webSearchConfigured = true;
                    const data = await response.json();
                    const name = data.active_provider || currentProvider;
                    document.getElementById('webSearchStatus').innerHTML = `<span class="status-indicator connected"></span><span>${name} 已配置</span>`;
                    localStorage.setItem('webSearchConfig', JSON.stringify(payload));
                    alert(`${name} 联网搜索配置成功！现在可以开启联网搜索增强功能。`);
                } else {
                    const err = await response.json();
                    alert('配置失败: ' + (err.detail || '未知错误'));
                }
            } catch (error) {
                alert('配置错误: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        async function generateOutline() {
            const topic = document.getElementById('topic').value;
            const language = document.getElementById('language').value;
            const useWebSearch = document.getElementById('useWebSearch').checked;

            if (!topic) {
                alert('请输入PPT主题或需求');
                return;
            }

            if (useWebSearch && !webSearchConfigured) {
                alert('联网搜索未配置，请先配置搜索引擎');
                return;
            }

            showLoading(useWebSearch ? '联网搜索并生成大纲中...' : '生成大纲中...');

            try {
                const response = await fetch('/api/generate-outline', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, language, use_llm: llmConfigured, use_web_search: useWebSearch })
                });

                if (!response.ok) throw new Error('生成大纲失败');

                currentOutline = await response.json();
                displayOutline(currentOutline);
                refreshLogs();
            } catch (error) {
                alert('错误: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        function useManualOutline() {
            const topic = document.getElementById('topic').value;
            const language = document.getElementById('language').value;
            if (!topic) {
                alert('请输入PPT主题作为大纲标题');
                return;
            }

            currentOutline = {
                title: topic,
                slides: [
                    { id: 1, type: 'title', title: topic, subtitle: '', content: '' },
                    { id: 2, type: 'agenda', title: '目录', subtitle: '', content: '请在下方编辑内容' },
                    { id: 3, type: 'content', title: '引言', subtitle: '', content: '请输入引言内容' },
                    { id: 4, type: 'content', title: '主要内容', subtitle: '', content: '请输入主要内容' },
                    { id: 5, type: 'content', title: '案例分析', subtitle: '', content: '请输入案例分析' },
                    { id: 6, type: 'thankyou', title: '谢谢', subtitle: '感谢您的聆听', content: '' }
                ],
                metadata: { language: language, total_slides: 6 }
            };

            displayOutline(currentOutline);
        }

        function displayOutline(outline) {
            const editor = document.getElementById('outlineEditor');
            const content = document.getElementById('outlineContent');

            editor.style.display = 'block';
            content.innerHTML = '<h3>' + outline.title + '</h3>';

            outline.slides.forEach((slide, index) => {
                const item = document.createElement('div');
                item.className = 'outline-item';
                item.innerHTML = `
                    <h4>[${slide.id}] ${slide.title} (${slide.type})</h4>
                    ${slide.subtitle ? `<p><strong>副标题：</strong><input type="text" id="subtitle_${index}" value="${slide.subtitle}"></p>` : ''}
                    ${slide.type === 'content' ? `<textarea id="content_${index}" placeholder="输入内容">${slide.content || ''}</textarea>` : ''}
                `;
                content.appendChild(item);
            });

            document.getElementById('previewContainer').style.display = 'none';
        }

        function updateOutlineFromEditor() {
            if (!currentOutline) return;

            currentOutline.slides.forEach((slide, index) => {
                const subtitleEl = document.getElementById(`subtitle_${index}`);
                const contentEl = document.getElementById(`content_${index}`);

                if (subtitleEl) slide.subtitle = subtitleEl.value;
                if (contentEl) slide.content = contentEl.value;
            });

            alert('大纲已更新');
            refreshLogs();
        }

        async function generateSlides() {
            if (!currentOutline) {
                alert('请先生成大纲');
                return;
            }

            updateOutlineFromEditor();

            const useWebSearch = document.getElementById('useWebSearch').checked;

            showLoading(useWebSearch ? '联网搜索并生成PPT中...' : '生成PPT中...');

            try {
                const response = await fetch('/api/generate-slides', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ outline: currentOutline, use_llm: llmConfigured, use_web_search: useWebSearch })
                });

                if (!response.ok) throw new Error('生成PPT失败');

                const result = await response.json();
                displayPPT(result.slides_html);
                refreshLogs();
            } catch (error) {
                alert('错误: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        function displayPPT(html) {
            const preview = document.getElementById('pptPreview');
            const container = document.getElementById('previewContainer');

            container.style.display = 'block';
            preview.src = 'data:text/html;charset=utf-8,' + encodeURIComponent(html);
        }

        function downloadHTML() {
            const preview = document.getElementById('pptPreview');
            const html = decodeURIComponent(preview.src.split(',')[1]);

            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (currentOutline?.title || 'PPT') + '.html';
            a.click();
            URL.revokeObjectURL(url);
        }

        async function downloadPPTX() {
            if (!currentOutline) {
                alert('请先生成大纲');
                return;
            }

            updateOutlineFromEditor();

            const useWebSearch = document.getElementById('useWebSearch').checked;

            showLoading('生成PPTX文件中...');

            try {
                const response = await fetch('/api/download-pptx', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ outline: currentOutline, use_llm: llmConfigured, use_web_search: useWebSearch })
                });

                if (!response.ok) throw new Error('生成PPTX失败');

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = (currentOutline?.title || 'PPT') + '.pptx';
                a.click();
                URL.revokeObjectURL(url);
                refreshLogs();
            } catch (error) {
                alert('错误: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        async function refreshLogs() {
            try {
                const response = await fetch('/api/logs');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('logViewer').textContent = data.logs || '无日志';
                    document.getElementById('logViewer').scrollTop = document.getElementById('logViewer').scrollHeight;
                }
            } catch (error) {
                console.error('获取日志失败:', error);
            }
        }

        function showLoading(message) {
            const loading = document.getElementById('loading');
            loading.querySelector('p').textContent = message;
            loading.classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        function clearForm() {
            document.getElementById('topic').value = '';
            document.getElementById('outlineEditor').style.display = 'none';
            document.getElementById('previewContainer').style.display = 'none';
            currentOutline = null;
        }

        function toggleLog() {
            const logContent = document.getElementById('logContent');
            const collapseBtn = document.querySelector('.collapse-btn');

            if (logContent.classList.contains('collapsed')) {
                logContent.classList.remove('collapsed');
                collapseBtn.textContent = '折叠';
            } else {
                logContent.classList.add('collapsed');
                collapseBtn.textContent = '展开';
            }
        }

        async function checkWebSearchStatus() {
            try {
                const response = await fetch('/api/web-search-status');
                if (response.ok) {
                    const data = await response.json();
                    if (data.is_configured) {
                        webSearchConfigured = true;
                        const name = data.active_provider_name || data.active_provider;
                        document.getElementById('webSearchStatus').innerHTML = `<span class="status-indicator connected"></span><span>${name} 已配置</span>`;
                        if (data.active_provider) {
                            currentProvider = data.active_provider;
                            selectProvider(currentProvider);
                        }
                    }
                }
            } catch (error) {
                console.error('获取联网搜索状态失败:', error);
            }
        }

        async function restoreConfigs() {
            const llmConfig = JSON.parse(localStorage.getItem('llmConfig') || 'null');
            if (llmConfig && llmConfig.api_endpoint && llmConfig.model_name) {
                document.getElementById('apiEndpoint').value = llmConfig.api_endpoint;
                document.getElementById('apiKey').value = llmConfig.api_key || '';
                document.getElementById('modelName').value = llmConfig.model_name;
                document.getElementById('isLocal').checked = llmConfig.is_local || false;
                try {
                    const response = await fetch('/api/configure-llm', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(llmConfig)
                    });
                    if (response.ok) {
                        llmConfigured = true;
                        document.getElementById('llmStatus').innerHTML = '<span class="status-indicator connected"></span><span>LLM已配置</span>';
                    }
                } catch (e) { console.error('恢复LLM配置失败:', e); }
            }

            const webConfig = JSON.parse(localStorage.getItem('webSearchConfig') || 'null');
            if (webConfig && webConfig.provider) {
                currentProvider = webConfig.provider;
                selectProvider(currentProvider);
                try {
                    const response = await fetch('/api/configure-web-search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(webConfig)
                    });
                    if (response.ok) {
                        webSearchConfigured = true;
                        const data = await response.json();
                        const name = data.active_provider || webConfig.provider;
                        document.getElementById('webSearchStatus').innerHTML = `<span class="status-indicator connected"></span><span>${name} 已配置</span>`;
                    }
                } catch (e) { console.error('恢复联网搜索配置失败:', e); }
            }
        }

        selectProvider('tavily');
        setInterval(refreshLogs, 5000);
        refreshLogs();
        restoreConfigs();
    </script>
</body>
</html>
